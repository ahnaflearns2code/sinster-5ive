<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sinister 5ive</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --red:#e53535;--red-bg:rgba(229,53,53,0.1);
      --bg:#0d0d0d;--s1:#161616;--s2:#1e1e1e;
      --bdr:#282828;--bdr2:#333;
      --t1:#f2f2f2;--t2:#aaa;--t3:#666;

    }
    body{background:var(--bg);color:var(--t1);font-family:var(--mono);}
    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-thumb{background:var(--red);}
    ::selection{background:var(--red);color:#fff;}
    @keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes scan{0%{top:-4px}100%{top:100vh}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes mq{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes slide{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
    .u1{animation:up .45s ease both;}
    .u2{animation:up .45s .1s ease both;}
    .u3{animation:up .45s .2s ease both;}
    .scanline{position:fixed;left:0;width:100%;height:3px;background:rgba(229,53,53,.05);z-index:9999;pointer-events:none;animation:scan 12s linear infinite;}
    .btn{cursor:pointer;border:none;font-family:var(--disp);letter-spacing:2px;transition:all .18s;display:inline-flex;align-items:center;gap:8px;}
    .br{background:var(--red);color:#fff;padding:13px 28px;font-size:15px;border-radius:2px;}
    .br:hover{background:#f04040;transform:translateY(-1px);box-shadow:0 6px 20px rgba(229,53,53,.35);}
    .bo{background:transparent;color:var(--red);border:1.5px solid var(--red);padding:12px 26px;font-size:15px;border-radius:2px;}
    .bo:hover{background:var(--red-bg);transform:translateY(-1px);}
    .bg{background:transparent;color:var(--t2);border:1.5px solid var(--bdr);padding:9px 18px;font-size:12px;font-family:var(--mono);letter-spacing:1px;border-radius:2px;}
    .bg:hover{border-color:var(--bdr2);color:var(--t1);}
    .bsm{padding:8px 16px;font-size:12px;letter-spacing:1.5px;}
    .card{background:var(--s1);border:1.5px solid var(--bdr);padding:24px;transition:border-color .22s,transform .22s,box-shadow .22s;border-radius:4px;}
    .card:hover{border-color:var(--bdr2);transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.55);}
    .cc{cursor:pointer;}
    .cc:hover{border-color:var(--red)!important;box-shadow:0 0 0 1px rgba(229,53,53,.12),0 10px 28px rgba(0,0,0,.55);}
    .tag{display:inline-block;padding:4px 10px;background:var(--s2);border:1.5px solid var(--bdr);font-size:11px;color:var(--t2);border-radius:2px;transition:all .18s;cursor:pointer;}
    .tag:hover,.tag.on{border-color:var(--red);color:var(--red);background:var(--red-bg);}
    .inp{width:100%;background:var(--s1);border:1.5px solid var(--bdr);color:var(--t1);padding:13px 15px;font-family:var(--mono);font-size:13px;outline:none;border-radius:2px;transition:border-color .18s;line-height:1.5;}
    .inp:focus{border-color:var(--red);}
    .inp::placeholder{color:var(--t3);}
    select.inp option{background:var(--s1);}
    .lbl{font-size:10px;letter-spacing:3px;color:var(--red);text-transform:uppercase;margin-bottom:6px;}
    .nav{padding:15px 40px;border-bottom:1.5px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(13,13,13,.96);backdrop-filter:blur(16px);z-index:200;}
    .logo{font-family:var(--disp);font-size:20px;letter-spacing:3px;cursor:pointer;}
    .logo span{color:var(--red);}
    .sbar{height:3px;background:var(--s2);border-radius:2px;overflow:hidden;}
    .sfill{height:100%;background:linear-gradient(90deg,var(--red),#ff6535);border-radius:2px;}
    .live{width:7px;height:7px;background:#22c55e;border-radius:50%;animation:pulse 2s infinite;display:inline-block;margin-right:7px;}
    .stat{border-left:2.5px solid var(--red);padding-left:14px;}
    .stat-n{font-family:var(--disp);font-size:38px;line-height:1;color:var(--t1);}
    .stat-l{font-size:10px;letter-spacing:3px;color:var(--t3);margin-top:3px;}
    .spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;display:inline-block;flex-shrink:0;}
    .ticker{overflow:hidden;white-space:nowrap;border-top:1.5px solid var(--bdr);border-bottom:1.5px solid var(--bdr);padding:9px 0;}
    .ti{display:inline-block;animation:mq 28s linear infinite;font-size:11px;letter-spacing:3px;color:var(--t3);}
    .ti .r{color:var(--red);margin:0 28px;}
    .role-card{border:1.5px solid var(--bdr);padding:36px;cursor:pointer;transition:all .25s;flex:1;border-radius:4px;}
    .role-card:hover,.role-card.sel{border-color:var(--red);background:var(--red-bg);}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;}
    .modal{background:var(--s1);border:1.5px solid var(--bdr2);width:100%;max-width:560px;max-height:88vh;display:flex;flex-direction:column;border-radius:6px;overflow:hidden;}
    .mh{padding:18px 22px;border-bottom:1.5px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .mb{flex:1;overflow-y:auto;padding:18px 22px;}
    .mf{padding:14px 22px;border-top:1.5px solid var(--bdr);flex-shrink:0;}
    .chat-row{display:flex;gap:10px;margin-bottom:14px;animation:slide .28s ease;}
    .bubble{padding:10px 14px;border-radius:3px;font-size:13px;line-height:1.65;max-width:82%;}
    .b-them{background:var(--s2);color:var(--t1);}
    .b-me{background:var(--red);color:#fff;margin-left:auto;}
    .av{width:30px;height:30px;background:var(--s2);border:1.5px solid var(--bdr2);display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-size:14px;color:var(--t2);flex-shrink:0;border-radius:3px;}
    .dots-p{display:flex;gap:6px;margin-bottom:26px;}
    .dot-p{width:28px;height:2px;background:var(--bdr);border-radius:1px;transition:background .25s;}
    .dot-p.on{background:var(--red);}
    @media(max-width:680px){.nav{padding:13px 18px;}.role-cards{flex-direction:column!important;}}
  </style>
</head>

// Fake chat — cycles through pre-written replies
function getFakeReply(target, msgCount) {
  const replies = target.replies || [];
  const idx = Math.min(msgCount, replies.length - 1);
  return replies[idx] || "I'll have my team follow up with you shortly.";
}

function ChatModal({target, onClose}) {
  const isEng = !!target.handle;
  const [msgs, setMsgs] = useState([]);
  const [inp, setInp] = useState("");
  const [loading, setLoading] = useState(false);
  const msgCount = useRef(0);
  const started = useRef(false);
  const bodyRef = useRef(null);

  useEffect(()=>{
    if(started.current) return;
    started.current = true;
    setLoading(true);
    setTimeout(()=>{
      setMsgs([{from:"them", text:getFakeReply(target, 0)}]);
      msgCount.current = 1;
      setLoading(false);
    }, 1200);
  },[]);

  useEffect(()=>{
    setTimeout(()=>{ if(bodyRef.current) bodyRef.current.scrollTop=99999; },80);
  },[msgs]);

  const send = ()=>{
    if(!inp.trim()||loading) return;
    const txt = inp.trim(); setInp("");
    setMsgs(p=>[...p,{from:"me",text:txt}]);
    setLoading(true);
    setTimeout(()=>{
      setMsgs(p=>[...p,{from:"them",text:getFakeReply(target, msgCount.current)}]);
      msgCount.current += 1;
      setLoading(false);
    }, 900 + Math.random()*800);
  };

  const av = isEng ? target.name[0] : target.logo;
  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="mh">
          <div style={{display:"flex",gap:12,alignItems:"center"}}>
            <div style={{width:40,height:40,background:"var(--red)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"var(--disp)",fontSize:20,color:"#fff",borderRadius:2,flexShrink:0}}>{av}</div>
            <div>
              <div style={{fontFamily:"var(--disp)",fontSize:18,color:"var(--t1)"}}>{target.name}</div>
              <div style={{fontSize:11,color:"var(--t3)",marginTop:1}}>{isEng?target.handle:target.contact}</div>
            </div>
          </div>
          <button className="btn bg" style={{padding:"6px 12px"}} onClick={onClose}>X</button>
        </div>
        <div className="mb" ref={bodyRef}>
          {msgs.length===0&&loading&&(
            <div style={{display:"flex",gap:10,alignItems:"center",color:"var(--t3)",fontSize:12,padding:"8px 0"}}>
              <span className="spin"/><span>Connecting...</span>
            </div>
          )}
          {msgs.map((m,i)=>(
            <div key={i} className="chat-row" style={{flexDirection:m.from==="me"?"row-reverse":"row"}}>
              {m.from==="them"&&<div className="av">{av}</div>}
              <div className={"bubble "+(m.from==="them"?"b-them":"b-me")}>{m.text}</div>
            </div>
          ))}
          {loading&&msgs.length>0&&(
            <div className="chat-row">
              <div className="av">{av}</div>
              <div className="bubble b-them" style={{display:"flex",gap:7,alignItems:"center",color:"var(--t3)"}}>
                <span className="spin" style={{width:12,height:12,borderWidth:1.5}}/> typing...
              </div>
            </div>
          )}
        </div>
        <div className="mf">
          <div style={{display:"flex",gap:10}}>
            <input className="inp" placeholder="Type a message..." value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} style={{flex:1}}/>
            <button className="btn br" style={{padding:"12px 18px",fontSize:13}} onClick={send} disabled={loading}>SEND</button>
          </div>
        </div>
      </div>
    </div>
  );
}

        <div className="mb">
          <div className="card" style={{marginBottom:18,background:"var(--s2)"}}>
            <p style={{fontSize:13,color:"var(--t2)",lineHeight:1.75}}>{company.looking}</p>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:11,paddingTop:11,borderTop:"1.5px solid var(--bdr)"}}>
              <span style={{fontSize:12,color:"var(--t3)"}}>Budget: <span style={{color:"var(--t1)"}}>{company.budget}</span></span>
              <span style={{fontSize:12,color:"var(--t3)"}}>{company.stage}</span>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:13}}>
            {fields.map(f=>(
              <div key={f.k}>
                <div className="lbl">{f.l}</div>
                {f.type==="textarea"
                  ? <textarea className="inp" rows={3} placeholder={f.ph||"Enter..."} value={form[f.k]||""} onChange={e=>fd(f.k,e.target.value)}/>
                  : <input className="inp" type="text" placeholder={f.ph||"Enter..."} value={form[f.k]||""} onChange={e=>fd(f.k,e.target.value)}/>
                }
              </div>
            ))}
          </div>
        </div>
        <div className="mf" style={{display:"flex",gap:10}}>
          <button className="btn br" onClick={()=>setStep(1)}>SUBMIT APPLICATION →</button>
          <button className="btn bg" onClick={onClose}>CANCEL</button>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
